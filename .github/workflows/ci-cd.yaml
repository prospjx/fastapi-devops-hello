# Name of the GitHub Actions workflow
name: ci-cd

# Define the events that trigger this workflow
on:
  push:
    # Trigger the workflow only when changes are pushed to the 'master' branch
    branches:
      - master

# Define security permissions for the default GITHUB_TOKEN used in the steps below
permissions:
  contents: read      # Allows the workflow to read and checkout the repository contents
  packages: write     # Allows the workflow to publish/write Docker images to GitHub Container Registry (GHCR)

# Define the jobs to run in this workflow
jobs:
  # The 'build' job handles dependency installation, Docker building, and publishing
  build:
    # Use a clean, GitHub-hosted Ubuntu runner to execute the steps
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Clone the repository code onto the runner VM
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Step 2: Install Python dependencies listed in requirements.txt (FastAPI, Uvicorn, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 3: Determine the Docker image path and save it to the workflow environment ($GITHUB_ENV)
      # This formats the name as ghcr.io/<github-username>/fastapi-devops-hello in strict lowercase
      - name: Set Image Name
        run: echo "IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Step 4: Log in to the GitHub Container Registry (GHCR)
      # Uses the repository's automatic GITHUB_TOKEN secret for authentication
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 5: Build the Docker image from the Dockerfile in the docker/ folder
      # Tags the image with the formatted image name and 'latest' tag
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest -f docker/Dockerfile .
      
      # Step 6: Push the built Docker image to GitHub Container Registry (GHCR)
      - name: Push image to GHCR
        run: docker push $IMAGE_NAME:latest
