apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-hello
  labels:
    apps: fastapi-hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-hello
  template:
    metadata:
      labels:
        app: fastapi-hello
    spec:
      containers:
        - name: fastapi-hello
          image: ghcr.io/prospjx/fastapi-devops-hello:latest
          ports:
            - containerPort: 8000
